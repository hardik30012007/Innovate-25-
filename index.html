<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbanGreen Delhi</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <!-- Icons (Minimal Use) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS -->
    <link rel="stylesheet" href="landing.css">
    <!-- Ensure global theme doesn't override layout, but might be needed for some vars if referenced -->
</head>
<body>

    <div class="container">
        <!-- Brand -->
        <h1 class="brand-name">UrbanGreen Delhi</h1>
        <p class="tagline">Data-driven planning for sustainable urban corridors.</p>

        <!-- Navigation Cards -->
        <div class="action-grid">
            <!-- Citizen View -->
            <a href="frontend/map.html" class="action-card">
                <div>
                    <div class="card-label">Public Access</div>
                    <div class="card-title">Citizen Map</div>
                    <div style="font-size: 0.9rem; color: #666;">Explore green zones, view scores, and vote on interventions.</div>
                </div>
                <div class="card-arrow"><i class="fa-solid fa-arrow-right"></i></div>
            </a>

            <!-- Government Dashboard -->
            <a href="frontend/admin.html" class="action-card">
                <div>
                    <div class="card-label">Administrative</div>
                    <div class="card-title">Government Dashboard</div>
                    <div style="font-size: 0.9rem; color: #666;">Review data, approve projects, and monitor progress.</div>
                </div>
                <div class="card-arrow"><i class="fa-solid fa-arrow-right"></i></div>
            </a>
        </div>

        <!-- Simple Footer -->

    </div>

</body>
</html>
