<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delhi Green Corridor Planner | Citizen View</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../theme.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="agent_ui.css">

  <!-- Theme Manager -->
  <script src="../theme.js"></script>
</head>

<body class="boxed-layout">

  <!-- Header -->
  <header class="page-header">
    <div class="header-container">
      <div class="logo-area">
        <span class="gradient-text" style="font-weight: 800; font-size: 1.75rem;">UrbanGreen Delhi</span>
        <span style="border-left: 1px solid var(--glass-border); margin-left:16px; padding-left:16px; color: var(--text-light-secondary); font-size: 1rem; font-weight: 500;">Citizen Map View</span>
      </div>
      <a href="../index.html" class="btn-home" style="color: var(--text-light-primary);">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
      </a>
    </div>
  </header>

  <main class="main-content">
    <div class="map-wrapper">
      <!-- Map Container -->
      <div id="map"></div>

      <!-- Layer Controls (Top Left) -->
      <div class="layer-controls">
        <div class="control-item" style="display: flex; align-items: center; gap: 10px;">
          <input type="checkbox" id="check-existing" checked style="cursor: pointer; width: 18px; height: 18px;">
          <label for="check-existing" style="cursor: pointer; color: var(--text-light-primary); font-weight: 500;">Existing Green Zones</label>
        </div>
        <div class="control-item" style="display: flex; align-items: center; gap: 10px;">
          <input type="checkbox" id="check-ai" checked style="cursor: pointer; width: 18px; height: 18px;">
          <label for="check-ai" style="cursor: pointer; color: var(--text-light-primary); font-weight: 500;">AI Recommendations</label>
        </div>
        <div class="control-item" style="display: flex; align-items: center; gap: 10px;">
          <input type="checkbox" id="check-anchors" checked style="cursor: pointer; width: 18px; height: 18px;">
          <label for="check-anchors" style="cursor: pointer; color: var(--text-light-primary); font-weight: 500;">Green Anchors</label>
        </div>
        <div class="control-item" style="display: flex; align-items: center; gap: 10px;">
          <input type="checkbox" id="check-wip" checked style="cursor: pointer; width: 18px; height: 18px;">
          <label for="check-wip" style="cursor: pointer; color: var(--text-light-primary); font-weight: 500;">Work In Progress</label>
        </div>
      </div>

      <!-- Top Right Group (Priority Alert + Legend) -->
      <div class="top-right-group">
        <!-- Priority AI Alert (Hidden by default) -->
        <div id="priority-alert" class="map-overlay-alert" style="display: none;">
          <div class="alert-content">
            <i class="fa-solid fa-bolt-lightning"></i>
            <span id="priority-text">Priority AI Suggestion Ready</span>
            <button id="btn-view-priority" class="btn-mini-action">View Zone</button>
          </div>
        </div>

        <!-- Color Legend -->
        <div class="color-legend">
          <div class="legend-entry">
            <span class="color-swatch" style="background: #00c853;"></span>
            <span class="label">Existing Zones</span>
          </div>
          <div class="legend-entry">
            <span class="color-swatch" style="background: #ffea00; border: 1px dashed #ff9100;"></span>
            <span class="label">AI Proposals</span>
          </div>
          <div class="legend-entry">
            <span class="color-swatch" style="background: #2e7d32;"></span>
            <span class="label">Green Anchors</span>
          </div>
        </div>
      </div>

      <!-- Level Control Overlay -->
      <div id="report-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
          <h3>Report Potential Green Zone</h3>
          <p>Please provide details about this area.</p>
          <form id="report-form">
            <div class="form-group">
              <label>Location Name / Description</label>
              <input type="text" id="report-name" placeholder="e.g., Empty plot near market" required>
            </div>
            <div class="form-group">
              <label>Your Contact (Optional)</label>
              <input type="text" id="report-contact" placeholder="Email or Phone">
            </div>
            <div class="form-group">
               <label>Description (Why is this spot suitable?)</label>
               <textarea id="report-desc" rows="3" placeholder="Sunny area, currently unused..."></textarea>
            </div>
            <div class="modal-actions">
              <button type="button" class="btn-cancel" onclick="window.closeReportModal()">Cancel</button>
              <button type="submit" class="btn-submit">Submit Report</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Map Controls (Bottom Left) -->
      <div class="map-controls-group">
        <button id="btn-report-zone" class="map-control-btn" title="Report New Zone">
            <i class="fa-solid fa-pen-to-square"></i>
        </button>
        <button id="btn-location" class="map-control-btn" title="My Location">
          <i class="fa-solid fa-location-crosshairs"></i>
        </button>
        <button id="btn-zoom-in" class="map-control-btn" title="Zoom In">
          <i class="fa-solid fa-plus"></i>
        </button>
        <button id="btn-zoom-out" class="map-control-btn" title="Zoom Out">
          <i class="fa-solid fa-minus"></i>
        </button>
        <button id="fullscreen-toggle" class="map-control-btn" title="Toggle Full Screen">
            <i class="fa-solid fa-expand"></i>
        </button>
      </div>
    </div>
  </main>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Map Logic -->
  <script src="animations.js"></script>
  <script src="map.js"></script>
  <script src="agent_ui.js"></script>
  <script src="script.js"></script>

</body>

</html>
