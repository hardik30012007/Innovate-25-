<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delhi Green Corridor Planner | Citizen View</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../theme.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="agent_ui.css">

  <!-- Theme Manager -->
  <script src="../theme.js"></script>
</head>

<body class="boxed-layout">

  <!-- Header -->
  <header class="page-header">
    <div class="header-container">
      <div class="logo-area">
        <i class="fa-solid fa-leaf"></i>
        <span>Urban Green Corridor Planning Platform</span>
      </div>
      <a href="../landing.html" class="btn-home">
        <i class="fa-solid fa-house"></i> Return Home
      </a>
    </div>
  </header>

  <main class="main-content">
    <div class="map-wrapper">
      <!-- Map Container -->
      <div id="map"></div>

      <!-- Layer Controls (Top Left) -->
      <div class="layer-controls">
        <div class="control-item">
          <input type="checkbox" id="check-green" checked>
          <label for="check-green">Existing Green Zones</label>
        </div>
        <div class="control-item">
          <input type="checkbox" id="check-ai" checked>
          <label for="check-ai">AI Recommendations</label>
        </div>
        <div class="control-item">
          <input type="checkbox" id="check-anchors" checked>
          <label for="check-anchors">Green Anchors</label>
        </div>
      </div>

      <!-- Color Legend (Bottom Right) -->
      <div class="color-legend">
        <div class="legend-entry">
          <span class="color-swatch" style="background: #00c853;"></span>
          <span class="label">Existing Zones</span>
        </div>
        <div class="legend-entry">
          <span class="color-swatch" style="background: #ffea00; border: 1px dashed #ff9100;"></span>
          <span class="label">AI Proposals</span>
        </div>
        <div class="legend-entry">
          <span class="color-swatch" style="background: #2e7d32;"></span>
          <span class="label">Green Anchors</span>
        </div>
      </div>

      <!-- Priority AI Alert (Hidden by default) -->
      <div id="priority-alert" class="map-overlay-alert" style="display: none;">
        <div class="alert-content">
          <i class="fa-solid fa-bolt-lightning"></i>
          <span id="priority-text">Priority AI Suggestion Ready</span>
          <button id="btn-view-priority" class="btn-mini-action">View Zone</button>
        </div>
      </div>

      <!-- Full Screen Toggle (Bottom Left) -->
      <button id="fullscreen-toggle" class="map-control-btn" title="Toggle Full Screen">
        <i class="fa-solid fa-expand"></i>
      </button>
    </div>
  </main>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Map Logic -->
  <script src="map.js"></script>
  <script src="agent_ui.js"></script>
  <script src="script.js"></script>

</body>

</html>
