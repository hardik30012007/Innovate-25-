<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Government Login - Green Corridor Dashboard</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Login CSS -->
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="login.css">
    <script src="theme.js"></script>
</head>

<body>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="gov-badge">
                    <i class="fa-solid fa-building-columns"></i>
                </div>
                <h1>Government Portal</h1>
                <p>Delhi Green Corridor Dashboard</p>
            </div>

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="email">
                        <i class="fa-solid fa-envelope"></i>
                        Email Address
                    </label>
                    <input type="email" id="email" placeholder="admin@test.com" required>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fa-solid fa-lock"></i>
                        Password
                    </label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>

                <div id="error-message" class="error-message hidden">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    <span>Invalid credentials. Please try again.</span>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    Sign In
                </button>
            </form>

            <div class="login-footer">
                <a href="landing.html" class="back-link">
                    <i class="fa-solid fa-arrow-left"></i>
                    Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="login.js"></script>
</body>

</html>
