<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | UrbanGreen Delhi</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #1b5e20;
            --primary-hover: #144a19;
            --bg: #f5f5f5;
            --text: #333;
            --border: #ddd;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .brand-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .brand-subtitle {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #555;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            box-sizing: border-box; /* Fix padding issue */
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(27, 94, 32, 0.1);
        }

        .btn-login {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: var(--primary-hover);
        }

        .footer-link {
            margin-top: 20px;
            font-size: 0.85rem;
        }

        .footer-link a {
            color: #666;
            text-decoration: none;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        .error-msg {
            color: #d32f2f;
            font-size: 0.9rem;
            margin-bottom: 15px;
            display: none;
        }

        /* Mock credentials helper */
        .hint {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #999;
            background: #fafafa;
            padding: 10px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h1 class="brand-title">UrbanGreen Delhi</h1>
        <p class="brand-subtitle">Government Administration</p>

        <div id="error-message" class="error-msg">Invalid Credentials</div>

        <form id="login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="admin" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Sign In</button>
        </form>

        <div class="footer-link">
            <a href="index.html">&larr; Return to Home</a>
        </div>

        <div class="hint">
            Tip: Use <strong>admin</strong> / <strong>admin123</strong>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Simple mock validation (for hackathon/demo purposes)
            if(user === 'admin' && pass === 'admin123') {
                // Redirect to admin dashboard
                window.location.href = 'frontend/admin.html';
            } else {
                document.getElementById('error-message').style.display = 'block';
                // Shake animation
                document.querySelector('.login-card').animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-5px)' },
                    { transform: 'translateX(5px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 300 });
            }
        });
    </script>

</body>
</html>
